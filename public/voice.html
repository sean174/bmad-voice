<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Mastermind Voice</title>
<style>
  :root { --navy:#0C1A2E; --navy2:#16263F; --gold:#C9A24B; --gold2:#EAD193; --ink:#E8ECF8; --mut:#8593B8; --dim:#5E6F8C; --ok:#3CBC5C; --bad:#D04848; }
  * { box-sizing:border-box; margin:0; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body { background: radial-gradient(900px 600px at 50% 30%, var(--navy2) 0%, var(--navy) 70%);
    color:var(--ink); font-family:ui-monospace,"SF Mono",Menlo,monospace; display:flex; flex-direction:column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); overflow:hidden; }

  header { flex:none; display:flex; align-items:center; justify-content:space-between; padding:14px 16px; }
  header a { color:var(--dim); text-decoration:none; font-size:11px; letter-spacing:.15em; }
  header a:active { color:var(--gold); }
  .brand { font-size:11px; letter-spacing:.3em; color:var(--gold); }
  .build { font-size:9px; letter-spacing:.12em; color:var(--dim); }

  #feed { flex:1; overflow-y:auto; padding:6px 18px 12px; display:flex; flex-direction:column; gap:12px; -webkit-overflow-scrolling:touch; }
  .turn { max-width:88%; font-size:15px; line-height:1.55; }
  .turn.me { align-self:flex-end; background:var(--gold); color:#1c1407; padding:9px 13px; border-radius:14px 14px 3px 14px; font-weight:500; }
  .turn.mm { align-self:flex-start; color:var(--ink); padding:2px 2px; }
  .turn.mm .tag { font-size:9px; letter-spacing:.25em; color:var(--gold); display:block; margin-bottom:5px; }
  .turn.sys { align-self:center; color:var(--bad); font-size:12px; text-align:center; }
  .cursor { display:inline-block; width:7px; height:14px; background:var(--gold); vertical-align:-2px; animation:blink .7s steps(1) infinite; }
  @keyframes blink { 50% { opacity:0; } }

  #dock { flex:none; display:flex; flex-direction:column; align-items:center; gap:10px; padding:10px 16px 22px; }
  #status { font-size:11px; letter-spacing:.22em; color:var(--mut); min-height:14px; text-transform:uppercase; }
  #timing { font-size:9.5px; letter-spacing:.08em; color:var(--dim); min-height:12px; }

  #orb { position:relative; width:96px; height:96px; border-radius:50%; border:0; cursor:pointer;
    background: radial-gradient(circle at 35% 30%, var(--gold2), var(--gold) 60%, #8a6c28);
    box-shadow: 0 0 36px rgba(201,162,75,.35), inset 0 -6px 14px rgba(0,0,0,.25);
    display:grid; place-items:center; transition: transform .12s; }
  #orb:active { transform: scale(.94); }
  #orb svg { width:38px; height:38px; }
  #orb .ring { position:absolute; inset:-10px; border-radius:50%; border:2px solid transparent; }
  body[data-state="recording"] #orb { background: radial-gradient(circle at 35% 30%, #ff8a8a, var(--bad) 60%, #7c2424); box-shadow:0 0 44px rgba(208,72,72,.5); }
  body[data-state="recording"] #orb .ring { border-color:rgba(208,72,72,.6); animation:pulse 1.1s ease-out infinite; }
  body[data-state="transcribing"] #orb, body[data-state="thinking"] #orb { background: radial-gradient(circle at 35% 30%, #41557d, var(--navy2) 60%, #0a1322); box-shadow:0 0 30px rgba(143,163,194,.3); }
  body[data-state="thinking"] #orb .ring { border-color:rgba(201,162,75,.5); animation:spin 1.2s linear infinite; border-top-color:var(--gold); }
  body[data-state="speaking"] #orb .ring { border-color:rgba(201,162,75,.45); animation:pulse 1.6s ease-out infinite; }
  @keyframes pulse { 0% { transform:scale(1); opacity:1; } 100% { transform:scale(1.35); opacity:0; } }
  @keyframes spin { to { transform:rotate(360deg); } }
  #hint { font-size:10px; letter-spacing:.18em; color:var(--dim); }
</style>
</head>
<body data-state="idle">
  <header>
    <a href="/?chat=1">◂ CHAT</a>
    <span class="brand">MASTERMIND VOICE</span>
    <span class="build">2026-06-12-2</span>
  </header>

  <div id="feed">
    <div class="turn mm"><span class="tag">MASTERMIND</span>Tap the orb and talk to me. I read the live Command Center before every answer.</div>
  </div>

  <div id="dock">
    <div id="status">TAP TO TALK</div>
    <button id="orb" aria-label="talk">
      <span class="ring"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="#1c1407" stroke-width="2" stroke-linecap="round">
        <rect x="9" y="3" width="6" height="11" rx="3" fill="#1c1407" stroke="none"/>
        <path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="21"/>
      </svg>
    </button>
    <div id="timing"></div>
    <div id="hint">TAP WHILE SPEAKING = INTERRUPT</div>
  </div>

<script>
(function () {
  'use strict';
  // ---- auth (shared with the main app) ----
  const token = localStorage.getItem('bmad_token');
  const userLabel = localStorage.getItem('bmad_label') || 'unknown';
  if (!token) { location.href = '/'; return; }
  function api(url, options = {}) {
    const headers = Object.assign({}, options.headers, { 'x-session-token': token });
    return fetch(url, Object.assign({}, options, { headers })).then((r) => {
      if (r.status === 401) { location.href = '/'; throw new Error('unauthorized'); }
      return r;
    });
  }

  // ---- elements / state machine ----
  const feed = document.getElementById('feed');
  const orb = document.getElementById('orb');
  const statusEl = document.getElementById('status');
  const timingEl = document.getElementById('timing');
  const STATES = { idle:'TAP TO TALK', recording:'LISTENING - TAP WHEN DONE', transcribing:'TRANSCRIBING', thinking:'THINKING', speaking:'SPEAKING - TAP TO INTERRUPT' };
  let state = 'idle';
  function setState(s) { state = s; document.body.dataset.state = s; statusEl.textContent = STATES[s] || s; }

  // ---- conversation ----
  let history = [];
  try { history = JSON.parse(sessionStorage.getItem('voice_history') || '[]'); } catch (e) {}
  function remember() { try { sessionStorage.setItem('voice_history', JSON.stringify(history.slice(-16))); } catch (e) {} }
  function addTurn(cls, text) {
    const d = document.createElement('div');
    d.className = 'turn ' + cls;
    if (cls === 'mm') { d.innerHTML = '<span class="tag">MASTERMIND</span>'; d.appendChild(document.createTextNode(text)); }
    else d.textContent = text;
    feed.appendChild(d);
    feed.scrollTop = feed.scrollHeight;
    return d;
  }

  // ---- audio out: one unlocked element + sequential sentence queue ----
  const player = new Audio();
  let unlocked = false;
  function unlock() {
    if (unlocked) return;
    unlocked = true;
    player.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
    player.play().catch(() => {});
  }
  let speakQueue = [];   // {urlPromise}
  let pumping = false;
  let speechStopped = false;
  let tFirstAudio = null;
  function synthesize(text) {
    return api('/api/speak', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    }).then((r) => (r.ok ? r.blob().then((b) => URL.createObjectURL(b)) : null)).catch(() => null);
  }
  function enqueueSpeech(text) {
    if (!text.trim() || speechStopped) return;
    speakQueue.push({ urlPromise: synthesize(text) });
    pump();
  }
  async function pump() {
    if (pumping) return;
    pumping = true;
    while (speakQueue.length && !speechStopped) {
      const item = speakQueue.shift();
      const url = await item.urlPromise;
      if (!url || speechStopped) continue;
      if (tFirstAudio === null) { tFirstAudio = performance.now(); paintTiming(); }
      if (state === 'thinking') setState('speaking');
      await new Promise((resolve) => {
        player.onended = () => { URL.revokeObjectURL(url); resolve(); };
        player.onerror = () => { URL.revokeObjectURL(url); resolve(); };
        player.src = url;
        player.play().catch(() => { URL.revokeObjectURL(url); resolve(); });
      });
    }
    pumping = false;
    if (!speakQueue.length && (state === 'speaking')) setState('idle');
  }
  function stopSpeech() {
    speechStopped = true;
    speakQueue = [];
    try { player.pause(); player.src = ''; } catch (e) {}
  }

  // ---- sentence splitter for streamed text ----
  let sentenceBuf = '';
  function feedSentences(delta, flush) {
    sentenceBuf += delta;
    const re = /[.!?…]["')\]]*\s+/g;
    let last = 0, m;
    while ((m = re.exec(sentenceBuf)) !== null) last = m.index + m[0].length;
    let out = '';
    if (last > 0) { out = sentenceBuf.slice(0, last); sentenceBuf = sentenceBuf.slice(last); }
    if (flush && sentenceBuf.trim()) { out += sentenceBuf; sentenceBuf = ''; }
    if (out.trim()) enqueueSpeech(out);
  }

  // ---- timings ----
  let T = {};
  function paintTiming() {
    const f = (a, b) => (a && b ? ((b - a) / 1000).toFixed(1) + 's' : '-');
    timingEl.textContent =
      'stt ' + f(T.recStop, T.sttDone) +
      ' · first token ' + f(T.sttDone, T.firstToken) +
      ' · first audio ' + f(T.recStop, tFirstAudio) +
      (T.streamDone ? ' · reply ' + f(T.sttDone, T.streamDone) : '');
  }

  // ---- mic: MediaRecorder everywhere (uniform, iOS-safe) ----
  let recorder = null, recChunks = [], micStream = null;
  async function startRecording() {
    unlock();
    try { micStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
    catch (e) { addTurn('sys', 'Microphone permission needed'); return; }
    const mime = (window.MediaRecorder && MediaRecorder.isTypeSupported('audio/mp4')) ? 'audio/mp4'
      : (window.MediaRecorder && MediaRecorder.isTypeSupported('audio/webm')) ? 'audio/webm' : '';
    recChunks = [];
    recorder = mime ? new MediaRecorder(micStream, { mimeType: mime }) : new MediaRecorder(micStream);
    recorder.ondataavailable = (e) => { if (e.data && e.data.size) recChunks.push(e.data); };
    recorder.onstop = onRecordingStopped;
    recorder.start();
    setState('recording');
  }
  function stopRecording() {
    if (recorder && recorder.state === 'recording') recorder.stop();
  }
  async function onRecordingStopped() {
    if (micStream) { micStream.getTracks().forEach((t) => t.stop()); micStream = null; }
    T = { recStop: performance.now() }; tFirstAudio = null; paintTiming();
    const type = (recorder && recorder.mimeType) || 'audio/mp4';
    const blob = new Blob(recChunks, { type });
    recChunks = [];
    if (blob.size < 800) { setState('idle'); return; }
    setState('transcribing');
    let text = '';
    try {
      const r = await api('/api/transcribe', { method: 'POST', headers: { 'Content-Type': type }, body: blob });
      const j = await r.json().catch(() => ({}));
      if (!r.ok) { addTurn('sys', j.error || 'Transcription failed'); setState('idle'); return; }
      text = (j.text || '').trim();
    } catch (e) { addTurn('sys', 'Transcription failed'); setState('idle'); return; }
    T.sttDone = performance.now(); paintTiming();
    if (!text) { setState('idle'); return; }
    addTurn('me', text);
    ask(text);
  }

  // ---- chat: stream, render, speak ----
  let aborter = null;
  async function ask(text) {
    history.push({ role: 'user', content: text });
    remember();
    setState('thinking');
    speechStopped = false;
    sentenceBuf = '';
    const bubble = addTurn('mm', '');
    const caret = document.createElement('span'); caret.className = 'cursor'; bubble.appendChild(caret);
    let full = '';
    aborter = new AbortController();
    try {
      const r = await api('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, user_label: userLabel, voice: true }),
        signal: aborter.signal,
      });
      if (!r.ok) {
        const j = await r.json().catch(() => ({}));
        caret.remove(); bubble.remove();
        addTurn('sys', j.error || 'Mastermind error ' + r.status);
        setState('idle');
        return;
      }
      const reader = r.body.getReader();
      const dec = new TextDecoder();
      let buf = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const lines = buf.split('\n'); buf = lines.pop() || '';
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const data = JSON.parse(line.slice(6));
            if (data.type === 'text' && data.content) {
              if (T.firstToken === undefined) { T.firstToken = performance.now(); paintTiming(); }
              full += data.content;
              bubble.childNodes[1].nodeValue = full;
              feed.scrollTop = feed.scrollHeight;
              feedSentences(data.content, false);
            }
          } catch (e) {}
        }
      }
      caret.remove();
      T.streamDone = performance.now(); paintTiming();
      full = full.trim();
      if (!full) { bubble.remove(); addTurn('sys', 'Empty reply - try again'); setState('idle'); return; }
      history.push({ role: 'assistant', content: full });
      remember();
      feedSentences('', true);
      if (!speakQueue.length && !pumping) setState('idle');
    } catch (e) {
      caret.remove();
      if (e.name !== 'AbortError') addTurn('sys', 'Connection error');
      setState('idle');
    } finally {
      aborter = null;
    }
  }

  // ---- the orb: one button, every state ----
  orb.addEventListener('click', () => {
    unlock();
    if (state === 'idle') return void startRecording();
    if (state === 'recording') return void stopRecording();
    if (state === 'thinking') { if (aborter) aborter.abort(); stopSpeech(); setState('idle'); return; }
    if (state === 'speaking') { stopSpeech(); setState('idle'); return; }
    // transcribing: brief, let it finish
  });
})();
</script>
</body>
</html>
