<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Mastermind Voice</title>
<script>
(function () {
  'use strict';
  const params = new URLSearchParams(window.location.search);
  if (params.get('legacy_voice') === '1') return;

  try { sessionStorage.setItem('prefer_chat', '1'); } catch (e) {}
  const url = new URL('/', window.location.origin);
  url.searchParams.set('mastermind', '1');
  url.searchParams.set('chat', '1');
  url.searchParams.set('v', '2026-06-13-2');
  url.searchParams.set('t', Date.now().toString(36));
  window.location.replace(url.toString());
})();
</script>
<style>
  :root { --navy:#0a1024; --navy2:#131c38; --gold:#e8b23a; --gold2:#f5d27a; --ink:#e8ecf8; --mut:#8593b8; --dim:#5e6f8c; --ok:#3cbc5c; --bad:#d04848; --line:#2a3a66; }
  * { box-sizing:border-box; margin:0; -webkit-tap-highlight-color:transparent; image-rendering:pixelated; }
  html,body { height:100%; }
  body { background:#05070f; color:var(--ink); font-family:ui-monospace,"SF Mono",Menlo,monospace;
    display:flex; flex-direction:column; overflow:hidden;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  /* CRT */
  body::after { content:""; position:fixed; inset:0; pointer-events:none; z-index:50;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0px, rgba(0,0,0,.18) 1px, transparent 2px, transparent 4px); }
  body::before { content:""; position:fixed; inset:0; pointer-events:none; z-index:51;
    background: radial-gradient(ellipse at center, transparent 58%, rgba(0,0,0,.5) 100%); }
  #stars { position:fixed; inset:0; pointer-events:none; opacity:.55; }

  header { flex:none; display:flex; align-items:center; justify-content:space-between; padding:14px 16px; position:relative; z-index:2; }
  header a { color:var(--dim); text-decoration:none; font-size:10px; letter-spacing:.2em; }
  header a:active { color:var(--gold); }
  .brand { font-size:11px; letter-spacing:.3em; color:var(--gold); text-shadow:2px 2px 0 #000; }
  .build { font-size:9px; letter-spacing:.12em; color:var(--dim); }

  #hud { flex:none; display:flex; justify-content:space-between; padding:0 18px 6px; font-size:10px; letter-spacing:.18em; position:relative; z-index:2; }
  #hud .p1 { color:var(--bad); font-weight:700; }
  #hud .coins { color:var(--gold); }

  #feed { flex:1; overflow-y:auto; padding:8px 18px 12px; display:flex; flex-direction:column; gap:14px; -webkit-overflow-scrolling:touch; position:relative; z-index:2; }
  .turn { max-width:90%; font-size:14px; line-height:1.7; }
  .turn.me { align-self:flex-end; background:var(--gold); color:#1c1407; padding:9px 12px; font-weight:600;
    border:2px solid var(--gold2); box-shadow:3px 3px 0 #000; }
  .turn.mm { align-self:flex-start; background:#1a2547; padding:11px 14px; border:2px solid var(--gold); border-right-color:#8a6c28; border-bottom-color:#8a6c28; box-shadow:3px 3px 0 #000; }
  .turn.mm .tag { font-size:9px; letter-spacing:.25em; color:var(--gold); display:block; margin-bottom:6px; }
  .turn.sys { align-self:center; color:var(--bad); font-size:11px; letter-spacing:.1em; text-align:center; }
  .cursor { display:inline-block; width:8px; height:13px; background:var(--gold); vertical-align:-2px; animation:blink .6s steps(1) infinite; }
  @keyframes blink { 50% { opacity:0; } }

  #dock { flex:none; display:flex; flex-direction:column; align-items:center; gap:10px; padding:10px 16px 22px; position:relative; z-index:2; }
  #status { font-size:11px; letter-spacing:.25em; color:var(--mut); min-height:14px; text-transform:uppercase; text-shadow:1px 1px 0 #000; }
  #timing { font-size:9px; letter-spacing:.06em; color:var(--dim); min-height:12px; }

  /* the orb is now a chunky arcade button */
  #orb { position:relative; width:104px; height:104px; border:0; cursor:pointer; padding:0; background:none; }
  #orb .px { position:absolute; inset:0; background:var(--gold);
    border:4px solid var(--gold2); border-bottom-color:#8a6c28; border-right-color:#8a6c28;
    box-shadow: 0 0 0 4px #000, 0 0 34px rgba(232,178,58,.35);
    display:grid; place-items:center; transition:transform .08s; }
  #orb:active .px { transform: translate(3px,3px); box-shadow:0 0 0 4px #000; }
  #orb svg { width:40px; height:40px; }
  #orb .ring { display:none; }
  body[data-state="recording"] #orb .px { background:var(--bad); border-color:#ff8a8a; border-bottom-color:#7c2424; border-right-color:#7c2424; box-shadow:0 0 0 4px #000, 0 0 40px rgba(208,72,72,.55); animation:recpulse 1s steps(2) infinite; }
  @keyframes recpulse { 50% { box-shadow:0 0 0 4px #000, 0 0 14px rgba(208,72,72,.3); } }
  body[data-state="transcribing"] #orb .px, body[data-state="thinking"] #orb .px { background:#41557d; border-color:#8fa3c2; border-bottom-color:#1c2440; border-right-color:#1c2440; box-shadow:0 0 0 4px #000, 0 0 26px rgba(143,163,194,.35); }
  body[data-state="thinking"] #orb .px { animation:thinkstep 0.9s steps(3) infinite; }
  @keyframes thinkstep { 33% { filter:brightness(1.25); } 66% { filter:brightness(.85); } }
  body[data-state="speaking"] #orb .px { animation:speakstep .5s steps(2) infinite; }
  @keyframes speakstep { 50% { filter:brightness(1.3); } }
  #hint { font-size:9px; letter-spacing:.2em; color:var(--dim); }

  /* idea coin moment */
  #ideaStamp { position:fixed; left:50%; top:38%; transform:translate(-50%,-50%) scale(0); z-index:60;
    background:var(--navy2); border:3px solid var(--gold); box-shadow:4px 4px 0 #000; padding:12px 18px;
    color:var(--gold); font-size:15px; letter-spacing:.25em; pointer-events:none; }
  #ideaStamp.show { animation:stampIn 1.6s steps(8) forwards; }
  @keyframes stampIn { 0% { transform:translate(-50%,-50%) scale(0); } 18% { transform:translate(-50%,-50%) scale(1.15); }
    28% { transform:translate(-50%,-50%) scale(1); } 80% { opacity:1; } 100% { opacity:0; transform:translate(-50%,-62%) scale(1); } }
</style>
</head>
<body data-state="idle">
<canvas id="stars"></canvas>
  <header>
    <a id="chat-link" href="/?mastermind=1&chat=1&v=2026-06-13-2">◂ CHAT</a>
    <span class="brand">MASTERMIND</span>
    <span class="build">2026-06-13-2</span>
  </header>
  <div id="hud"><span class="p1">1UP SEAN</span><span class="coins" id="coinHud">IDEAS BANKED 0</span></div>

  <div id="feed">
    <div class="turn mm"><span class="tag">MASTERMIND</span>Press the button and talk to me. I read the live Command Center before every answer.</div>
  </div>

  <div id="dock">
    <div id="status">TAP TO TALK</div>
    <button id="orb" aria-label="talk">
      <span class="px">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1c1407" stroke-width="2.4" stroke-linecap="square">
        <rect x="9" y="3" width="6" height="11" fill="#1c1407" stroke="none"/>
        <path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="21"/>
      </svg>
      </span>
    </button>
    <div id="timing"></div>
    <div id="hint">TAP WHILE SPEAKING = INTERRUPT · SAY "SAVE THIS AS AN IDEA..."</div>
  <div id="ideaStamp">IDEA BANKED!</div>
  </div>

<script>
(function () {
  'use strict';
  // ---- auth (shared with the main app) ----
  const token = localStorage.getItem('bmad_token');
  const userLabel = localStorage.getItem('bmad_label') || 'unknown';
  if (!token) { location.href = '/'; return; }

  const chatLink = document.getElementById('chat-link');
  if (chatLink) {
    chatLink.addEventListener('click', (event) => {
      event.preventDefault();
      try { sessionStorage.setItem('prefer_chat', '1'); } catch (e) {}
      const url = new URL('/', window.location.origin);
      url.searchParams.set('mastermind', '1');
      url.searchParams.set('chat', '1');
      url.searchParams.set('v', '2026-06-13-2');
      url.searchParams.set('t', Date.now().toString(36));
      window.location.href = url.toString();
    });
  }

  function api(url, options = {}) {
    const headers = Object.assign({}, options.headers, { 'x-session-token': token });
    return fetch(url, Object.assign({}, options, { headers })).then((r) => {
      if (r.status === 401) { location.href = '/'; throw new Error('unauthorized'); }
      return r;
    });
  }

  // ---- 8-bit: chiptune blips ----
  let actx = null;
  function blip(f, d, type, v) {
    try {
      actx = actx || new (window.AudioContext || window.webkitAudioContext)();
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = type || 'square'; o.frequency.value = f;
      g.gain.value = v || 0.035;
      g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + (d || 0.08));
      o.connect(g); g.connect(actx.destination);
      o.start(); o.stop(actx.currentTime + (d || 0.08));
    } catch (e) {}
  }
  function coinJingle() { // the classic two-note coin
    blip(988, 0.09, 'square', 0.05);
    setTimeout(() => blip(1319, 0.35, 'square', 0.05), 80);
  }

  // ---- 8-bit: starfield ----
  (function () {
    const cv = document.getElementById('stars'), ctx2 = cv.getContext('2d');
    function paint() {
      cv.width = innerWidth; cv.height = innerHeight;
      ctx2.clearRect(0, 0, cv.width, cv.height);
      for (let i = 0; i < 70; i++) {
        ctx2.fillStyle = 'rgba(200,210,240,' + (Math.random() * 0.5 + 0.1) + ')';
        ctx2.fillRect(Math.random() * cv.width, Math.random() * cv.height, 2, 2);
      }
    }
    paint(); addEventListener('resize', paint); setInterval(paint, 4000);
  })();

  // ---- idea coin moment ----
  function paintCtx(loaded, admin) {
    let el = document.getElementById('ctxHud');
    if (!el) {
      el = document.createElement('span');
      el.id = 'ctxHud';
      el.style.cssText = 'letter-spacing:.18em;';
      document.getElementById('hud').insertBefore(el, document.getElementById('coinHud'));
    }
    if (loaded) { el.textContent = 'CTX OK'; el.style.color = 'var(--ok)'; }
    else if (!admin) {
      el.textContent = 'CTX OFF - NO PLAYER';
      el.style.color = 'var(--bad)';
      showPlayerSelect();
    } else { el.textContent = 'CTX OFF - BRIDGE'; el.style.color = 'var(--bad)'; }
  }

  // 8-bit player select: the label gate is client-asserted anyway, so when the
  // stored label is stale we just ask. No logout ritual.
  let playerShown = false;
  function showPlayerSelect() {
    if (playerShown) return;
    playerShown = true;
    const ov = document.createElement('div');
    ov.style.cssText = 'position:fixed;inset:0;z-index:70;background:rgba(5,7,15,.92);display:grid;place-items:center;';
    ov.innerHTML = '<div style="text-align:center">' +
      '<div style="color:#fff;font-size:14px;letter-spacing:.4em;margin-bottom:22px;text-shadow:2px 2px 0 #000">PLAYER SELECT</div>' +
      '<button id="p1btn" style="display:block;margin:0 auto 12px;background:var(--gold);color:#1c1407;border:3px solid var(--gold2);border-bottom-color:#8a6c28;border-right-color:#8a6c28;box-shadow:3px 3px 0 #000;padding:12px 30px;font-family:inherit;font-size:13px;letter-spacing:.3em;font-weight:700;cursor:pointer">SEAN</button>' +
      '<div style="color:var(--dim);font-size:9px;letter-spacing:.15em">RESTORES COMMAND CENTER CONTEXT</div></div>';
    document.body.appendChild(ov);
    document.getElementById('p1btn').addEventListener('click', () => {
      localStorage.setItem('bmad_label', 'Sean');
      blip(523, 0.07); blip(784, 0.08); setTimeout(() => blip(1047, 0.2), 120);
      ov.remove();
      addTurn('sys', 'PLAYER 1 READY - Command Center context restored on your next message.');
      location.reload();
    });
  }

  let ideasBanked = Number(sessionStorage.getItem('ideas_banked') || 0);
  const coinHud = document.getElementById('coinHud');
  function paintCoins() { coinHud.textContent = 'IDEAS BANKED ' + ideasBanked; }
  paintCoins();
  const IDEA_RE = /^\s*(?:(?:please|hey|ok|okay)\s+)*(?:(?:can|could|will)\s+you\s+)?(?:please\s+)?(?:save\s+this\s+as\s+an\s+idea|save\s+as\s+idea|save\s+this\s+idea|capture\s+this\s+idea|add\s+this\s+to\s+ideas|add\s+to\s+ideas|put\s+this\s+in\s+ideas|park\s+this\s+idea|note\s+this\s+idea)/i;
  function ideaBanked() {
    ideasBanked += 1;
    sessionStorage.setItem('ideas_banked', String(ideasBanked));
    paintCoins();
    coinJingle();
    const stamp = document.getElementById('ideaStamp');
    stamp.classList.remove('show'); void stamp.offsetWidth;
    stamp.classList.add('show');
    // pixel coin burst from the button
    const r = orb.getBoundingClientRect();
    for (let i = 0; i < 14; i++) {
      const sq = document.createElement('span');
      const c = ['#e8b23a', '#f5d27a', '#fff'][i % 3];
      sq.style.cssText = 'position:fixed;z-index:61;width:6px;height:6px;background:' + c +
        ';left:' + (r.left + r.width / 2) + 'px;top:' + (r.top + r.height / 2) + 'px;' +
        'box-shadow:1px 1px 0 #000;transition:transform .7s steps(7),opacity .7s steps(7);pointer-events:none;';
      document.body.appendChild(sq);
      const ang = Math.random() * 6.283, d = 50 + Math.random() * 70;
      requestAnimationFrame(() => {
        sq.style.transform = 'translate(' + Math.cos(ang) * d + 'px,' + (Math.sin(ang) * d - 40) + 'px)';
        sq.style.opacity = '0';
      });
      setTimeout(() => sq.remove(), 750);
    }
  }

  // ---- elements / state machine ----
  const feed = document.getElementById('feed');
  const orb = document.getElementById('orb');
  const statusEl = document.getElementById('status');
  const timingEl = document.getElementById('timing');
  const STATES = { idle:'TAP TO TALK', recording:'LISTENING - TAP WHEN DONE', transcribing:'TRANSCRIBING', thinking:'THINKING', speaking:'SPEAKING - TAP TO INTERRUPT' };
  let state = 'idle';
  function setState(s) {
    const prev = state;
    state = s; document.body.dataset.state = s; statusEl.textContent = STATES[s] || s;
    if (prev !== s) {
      if (s === 'recording') { blip(523, 0.06); blip(784, 0.07); }
      else if (s === 'transcribing') blip(659, 0.06);
      else if (s === 'speaking' && prev === 'thinking') blip(880, 0.05, 'square', 0.02);
    }
  }

  // ---- conversation ----
  let history = [];
  try { history = JSON.parse(sessionStorage.getItem('voice_history') || '[]'); } catch (e) {}
  function remember() { try { sessionStorage.setItem('voice_history', JSON.stringify(history.slice(-16))); } catch (e) {} }
  function addTurn(cls, text) {
    const d = document.createElement('div');
    d.className = 'turn ' + cls;
    if (cls === 'mm') { d.innerHTML = '<span class="tag">MASTERMIND</span>'; d.appendChild(document.createTextNode(text)); }
    else d.textContent = text;
    feed.appendChild(d);
    feed.scrollTop = feed.scrollHeight;
    return d;
  }

  // ---- audio out: one unlocked element + sequential sentence queue ----
  const player = new Audio();
  let unlocked = false;
  function unlock() {
    if (unlocked) return;
    unlocked = true;
    player.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
    player.play().catch(() => {});
  }
  let speakQueue = [];   // {urlPromise}
  let pumping = false;
  let speechStopped = false;
  let tFirstAudio = null;
  function synthesize(text) {
    return api('/api/speak', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    }).then((r) => (r.ok ? r.blob().then((b) => URL.createObjectURL(b)) : null)).catch(() => null);
  }
  function enqueueSpeech(text) {
    if (!text.trim() || speechStopped) return;
    speakQueue.push({ urlPromise: synthesize(text) });
    pump();
  }
  async function pump() {
    if (pumping) return;
    pumping = true;
    while (speakQueue.length && !speechStopped) {
      const item = speakQueue.shift();
      const url = await item.urlPromise;
      if (!url || speechStopped) continue;
      if (tFirstAudio === null) { tFirstAudio = performance.now(); paintTiming(); }
      if (state === 'thinking') setState('speaking');
      await new Promise((resolve) => {
        player.onended = () => { URL.revokeObjectURL(url); resolve(); };
        player.onerror = () => { URL.revokeObjectURL(url); resolve(); };
        player.src = url;
        player.play().catch(() => { URL.revokeObjectURL(url); resolve(); });
      });
    }
    pumping = false;
    if (!speakQueue.length && (state === 'speaking')) setState('idle');
  }
  function stopSpeech() {
    speechStopped = true;
    speakQueue = [];
    try { player.pause(); player.src = ''; } catch (e) {}
  }

  // ---- sentence splitter for streamed text ----
  let sentenceBuf = '';
  function feedSentences(delta, flush) {
    sentenceBuf += delta;
    const re = /[.!?…]["')\]]*\s+/g;
    let last = 0, m;
    while ((m = re.exec(sentenceBuf)) !== null) last = m.index + m[0].length;
    let out = '';
    if (last > 0) { out = sentenceBuf.slice(0, last); sentenceBuf = sentenceBuf.slice(last); }
    if (flush && sentenceBuf.trim()) { out += sentenceBuf; sentenceBuf = ''; }
    if (out.trim()) enqueueSpeech(out);
  }

  // ---- timings ----
  let T = {};
  function paintTiming() {
    const f = (a, b) => (a && b ? ((b - a) / 1000).toFixed(1) + 's' : '-');
    timingEl.textContent =
      'stt ' + f(T.recStop, T.sttDone) +
      ' · first token ' + f(T.sttDone, T.firstToken) +
      ' · first audio ' + f(T.recStop, tFirstAudio) +
      (T.streamDone ? ' · reply ' + f(T.sttDone, T.streamDone) : '');
  }

  // ---- mic: MediaRecorder everywhere (uniform, iOS-safe) ----
  let recorder = null, recChunks = [], micStream = null;
  async function startRecording() {
    unlock();
    try { micStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
    catch (e) { addTurn('sys', 'Microphone permission needed'); return; }
    const mime = (window.MediaRecorder && MediaRecorder.isTypeSupported('audio/mp4')) ? 'audio/mp4'
      : (window.MediaRecorder && MediaRecorder.isTypeSupported('audio/webm')) ? 'audio/webm' : '';
    recChunks = [];
    recorder = mime ? new MediaRecorder(micStream, { mimeType: mime }) : new MediaRecorder(micStream);
    recorder.ondataavailable = (e) => { if (e.data && e.data.size) recChunks.push(e.data); };
    recorder.onstop = onRecordingStopped;
    recorder.start();
    setState('recording');
  }
  function stopRecording() {
    if (recorder && recorder.state === 'recording') recorder.stop();
  }
  async function onRecordingStopped() {
    if (micStream) { micStream.getTracks().forEach((t) => t.stop()); micStream = null; }
    T = { recStop: performance.now() }; tFirstAudio = null; paintTiming();
    const type = (recorder && recorder.mimeType) || 'audio/mp4';
    const blob = new Blob(recChunks, { type });
    recChunks = [];
    if (blob.size < 800) { setState('idle'); return; }
    setState('transcribing');
    let text = '';
    try {
      const r = await api('/api/transcribe', { method: 'POST', headers: { 'Content-Type': type }, body: blob });
      const j = await r.json().catch(() => ({}));
      if (!r.ok) { addTurn('sys', j.error || 'Transcription failed'); setState('idle'); return; }
      text = (j.text || '').trim();
    } catch (e) { addTurn('sys', 'Transcription failed'); blip(140, 0.25, 'sawtooth', 0.04); setState('idle'); return; }
    T.sttDone = performance.now(); paintTiming();
    if (!text) { setState('idle'); return; }
    addTurn('me', text);
    ask(text);
  }

  // ---- chat: stream, render, speak ----
  let aborter = null;
  async function ask(text) {
    history.push({ role: 'user', content: text });
    remember();
    setState('thinking');
    speechStopped = false;
    sentenceBuf = '';
    const bubble = addTurn('mm', '');
    const caret = document.createElement('span'); caret.className = 'cursor'; bubble.appendChild(caret);
    let full = '';
    aborter = new AbortController();
    try {
      const r = await api('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, user_label: userLabel, voice: true }),
        signal: aborter.signal,
      });
      if (!r.ok) {
        const j = await r.json().catch(() => ({}));
        caret.remove(); bubble.remove();
        addTurn('sys', j.error || 'Mastermind error ' + r.status);
        setState('idle');
        return;
      }
      const reader = r.body.getReader();
      const dec = new TextDecoder();
      let buf = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const lines = buf.split('\n'); buf = lines.pop() || '';
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const data = JSON.parse(line.slice(6));
            if (data.type === 'meta') {
              paintCtx(data.ctx, data.admin);
            }
            if (data.type === 'text' && data.content) {
              if (T.firstToken === undefined) { T.firstToken = performance.now(); paintTiming(); }
              full += data.content;
              bubble.childNodes[1].nodeValue = full;
              feed.scrollTop = feed.scrollHeight;
              feedSentences(data.content, false);
            }
          } catch (e) {}
        }
      }
      caret.remove();
      T.streamDone = performance.now(); paintTiming();
      full = full.trim();
      if (!full) { bubble.remove(); addTurn('sys', 'Empty reply - try again'); setState('idle'); return; }
      history.push({ role: 'assistant', content: full });
      remember();
      feedSentences('', true);
      const lastUser = history.filter(h => h.role === 'user').pop();
      if (lastUser && IDEA_RE.test(lastUser.content)) ideaBanked();
      if (!speakQueue.length && !pumping) setState('idle');
    } catch (e) {
      caret.remove();
      if (e.name !== 'AbortError') addTurn('sys', 'Connection error');
      setState('idle');
    } finally {
      aborter = null;
    }
  }

  // ---- the orb: one button, every state ----
  orb.addEventListener('click', () => {
    unlock();
    if (state === 'idle') return void startRecording();
    if (state === 'recording') return void stopRecording();
    if (state === 'thinking') { if (aborter) aborter.abort(); stopSpeech(); setState('idle'); return; }
    if (state === 'speaking') { stopSpeech(); setState('idle'); return; }
    // transcribing: brief, let it finish
  });
})();
</script>
